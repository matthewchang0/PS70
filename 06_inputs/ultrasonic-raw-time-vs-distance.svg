<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 371" role="img" aria-labelledby="title desc">
  <title id="title">Raw ultrasonic return time vs. distance</title>
  <desc id="desc">Line graph showing ultrasonic return time in microseconds increasing as distance increases from 1 to 20 centimeters.</desc>
  <rect width="600" height="371" fill="#ffffff"/>

  <text x="19" y="38" font-family="Arial, sans-serif" font-size="21" fill="#707070">Raw time value (&#181;s) vs. Distance (cm)</text>

  <g stroke="#c9c9c9" stroke-width="1">
    <line x1="189.6" y1="61" x2="189.6" y2="300"/>
    <line x1="320.4" y1="61" x2="320.4" y2="300"/>
    <line x1="451.2" y1="61" x2="451.2" y2="300"/>
    <line x1="582.0" y1="61" x2="582.0" y2="300"/>
    <line x1="85" y1="300.0" x2="582" y2="300.0"/>
    <line x1="85" y1="252.2" x2="582" y2="252.2"/>
    <line x1="85" y1="204.4" x2="582" y2="204.4"/>
    <line x1="85" y1="156.6" x2="582" y2="156.6"/>
    <line x1="85" y1="108.8" x2="582" y2="108.8"/>
    <line x1="85" y1="61.0" x2="582" y2="61.0"/>
  </g>

  <g stroke="#333333" stroke-width="1">
    <line x1="85" y1="300" x2="582" y2="300"/>
    <line x1="85" y1="300" x2="85" y2="61"/>
  </g>

  <polyline fill="none" stroke="#4285f4" stroke-width="2.2" points="85.0,257.2 111.2,248.6 137.3,258.5 163.5,257.2 189.6,252.0 215.8,241.3 241.9,234.0 268.1,218.7 294.3,208.0 320.4,201.3 346.6,191.4 372.7,174.8 398.9,167.5 425.1,157.6 451.2,142.3 477.4,130.2 503.5,119.5 582.0,87.0"/>

  <g font-family="Arial, sans-serif" font-size="12" fill="#111111">
    <text x="189.6" y="318" text-anchor="middle">5</text>
    <text x="320.4" y="318" text-anchor="middle">10</text>
    <text x="451.2" y="318" text-anchor="middle">15</text>
    <text x="582.0" y="318" text-anchor="middle">20</text>
    <text x="77" y="304.0" text-anchor="end">0</text>
    <text x="77" y="256.2" text-anchor="end">250</text>
    <text x="77" y="208.4" text-anchor="end">500</text>
    <text x="77" y="160.6" text-anchor="end">750</text>
    <text x="77" y="112.8" text-anchor="end">1000</text>
    <text x="77" y="65.0" text-anchor="end">1250</text>
  </g>

  <text x="333.5" y="350" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#111111">Distance (cm)</text>
  <text x="27" y="181" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#111111" transform="rotate(-90 27 181)">Raw time value (&#181;s)</text>
</svg>
