<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 371" role="img" aria-labelledby="title desc">
  <title id="title">Ultrasonic distance vs. real distance</title>
  <desc id="desc">Line graph comparing distance measured by the ultrasonic sensor against the real measured distance in centimeters. The curve is close to a one-to-one line.</desc>
  <rect width="600" height="371" fill="#ffffff"/>

  <text x="19" y="38" font-family="Arial, sans-serif" font-size="21" fill="#707070">Ultrasonic distance (cm) vs. Real distance (cm)</text>

  <g stroke="#c9c9c9" stroke-width="1">
    <line x1="184.1" y1="61" x2="184.1" y2="300"/>
    <line x1="316.7" y1="61" x2="316.7" y2="300"/>
    <line x1="449.4" y1="61" x2="449.4" y2="300"/>
    <line x1="582.0" y1="61" x2="582.0" y2="300"/>
    <line x1="78" y1="300.0" x2="582" y2="300.0"/>
    <line x1="78" y1="252.2" x2="582" y2="252.2"/>
    <line x1="78" y1="204.4" x2="582" y2="204.4"/>
    <line x1="78" y1="156.6" x2="582" y2="156.6"/>
    <line x1="78" y1="108.8" x2="582" y2="108.8"/>
    <line x1="78" y1="61.0" x2="582" y2="61.0"/>
  </g>

  <g stroke="#333333" stroke-width="1">
    <line x1="78" y1="300" x2="582" y2="300"/>
    <line x1="78" y1="300" x2="78" y2="61"/>
  </g>

  <line x1="78.0" y1="290.4" x2="582.0" y2="108.8" stroke="#777777" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.65"/>
  <polyline fill="none" stroke="#4285f4" stroke-width="2.2" points="78.0,245.5 104.5,261.8 131.1,260.8 157.6,265.6 184.1,251.2 210.6,246.5 237.2,235.0 263.7,227.3 290.2,215.9 316.7,211.1 343.3,196.8 369.8,187.2 396.3,176.7 422.8,167.1 449.4,155.6 475.9,145.1 502.4,135.6 582.0,105.0"/>

  <g font-family="Arial, sans-serif" font-size="12" fill="#111111">
    <text x="184.1" y="318" text-anchor="middle">5</text>
    <text x="316.7" y="318" text-anchor="middle">10</text>
    <text x="449.4" y="318" text-anchor="middle">15</text>
    <text x="582.0" y="318" text-anchor="middle">20</text>
    <text x="70" y="304.0" text-anchor="end">0</text>
    <text x="70" y="256.2" text-anchor="end">5</text>
    <text x="70" y="208.4" text-anchor="end">10</text>
    <text x="70" y="160.6" text-anchor="end">15</text>
    <text x="70" y="112.8" text-anchor="end">20</text>
    <text x="70" y="65.0" text-anchor="end">25</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="12" fill="#666666">
    <line x1="396" y1="86" x2="430" y2="86" stroke="#777777" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.65"/>
    <text x="438" y="90">y = x reference</text>
  </g>

  <text x="330" y="350" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#111111">Real distance (cm)</text>
  <text x="28" y="181" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#111111" transform="rotate(-90 28 181)">Ultrasonic distance (cm)</text>
</svg>
